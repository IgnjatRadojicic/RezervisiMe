<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/Client/">
    <title>Registracija — RezervisiMe</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="site-logo">
                <img src="assets/logo-top.png" alt="RezervisiMe" class="site-logo__img">
            </a>
            <div class="site-header__actions" id="header-actions">
                <div class="locale">RSD <span class="locale__flag">🇷🇸</span></div>
                <a href="register.html?role=host" class="btn btn--ghost">Izloži svoju nekretninu</a>
                <a href="register.html" class="btn btn--outline">Registruj se</a>
                <a href="login.html" class="btn btn--solid">Prijavi se</a>
            </div>
        </div>
    </header>

    <main class="auth">
        <section class="auth-hero">
            <div class="auth-hero__inner">
                <p class="eyebrow" id="auth-eyebrow">Pridruži se</p>
                <h1 class="auth-hero__title" id="auth-title">Napravi nalog</h1>
            </div>
        </section>

        <div class="auth-card-wrap">
            <form class="auth-card auth-card--wide" id="register-form" novalidate>
                <div class="auth-alert is-hidden" id="auth-alert"></div>

                <div class="auth-card__row">
                    <label class="auth-field">
                        <span class="auth-field__label">Ime</span>
                        <input type="text" name="firstName" placeholder="npr. Marko" autocomplete="given-name" required>
                    </label>
                    <label class="auth-field">
                        <span class="auth-field__label">Prezime</span>
                        <input type="text" name="lastName" placeholder="npr. Petrović" autocomplete="family-name" required>
                    </label>
                </div>

                <div class="auth-card__row">
                    <label class="auth-field">
                        <span class="auth-field__label">Korisničko ime</span>
                        <input type="text" name="username" placeholder="npr. marko" autocomplete="username" required>
                    </label>
                    <label class="auth-field">
                        <span class="auth-field__label">Email</span>
                        <input type="email" name="email" placeholder="marko@primer.rs" autocomplete="email" required>
                    </label>
                </div>

                <div class="auth-card__row">
                    <label class="auth-field">
                        <span class="auth-field__label">Datum rođenja</span>
                        <input type="date" name="dateOfBirth" required>
                    </label>
                    <label class="auth-field">
                        <span class="auth-field__label">Pol</span>
                        <select name="gender">
                            <option value="Muski">Muški</option>
                            <option value="Zenski">Ženski</option>
                            <option value="Drugo">Drugo</option>
                        </select>
                    </label>
                </div>

                <label class="auth-field">
                    <span class="auth-field__label">Lozinka</span>
                    <input type="password" name="password" placeholder="Najmanje 6 karaktera" autocomplete="new-password" required>
                </label>

                <button type="submit" class="auth-submit" id="auth-submit">Registruj se</button>

                <p class="auth-switch">
                    Već imaš nalog? <a href="login.html">Prijavi se</a>.
                </p>
            </form>
        </div>
    </main>

    <footer class="site-footer--art">
        <img src="assets/bottom.png" alt="Znamenitosti Srbije" class="footer-art__img">
    </footer>

    <script src="js/lib/jquery-3.7.1.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/register.js"></script>

</body>
</html>
