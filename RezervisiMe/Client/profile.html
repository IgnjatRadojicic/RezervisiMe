<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/Client/">
    <title>Moj nalog — RezervisiMe</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="site-logo">
                <img src="assets/logo-top.png" alt="RezervisiMe" class="site-logo__img">
            </a>
            <div class="site-header__actions" id="header-actions"></div>
        </div>
    </header>

    <main class="container profile">
        <div class="page-head">
            <div>
                <h1 class="page-title">Moj nalog</h1>
                <div class="page-sub" id="profile-sub"></div>
            </div>
        </div>

        <div class="profile-card">
            <form id="profile-form" novalidate>
                <div id="profile-alert" class="page-alert is-hidden"></div>
                <div class="form-row">
                    <label class="form-field">
                        <span class="form-field__label">Korisničko ime</span>
                        <input type="text" id="p-username" disabled>
                    </label>
                    <label class="form-field">
                        <span class="form-field__label">Uloga</span>
                        <input type="text" id="p-role" disabled>
                    </label>
                </div>
                <div class="form-row">
                    <label class="form-field">
                        <span class="form-field__label">Ime</span>
                        <input type="text" id="p-first">
                    </label>
                    <label class="form-field">
                        <span class="form-field__label">Prezime</span>
                        <input type="text" id="p-last">
                    </label>
                </div>
                <label class="form-field">
                    <span class="form-field__label">Email</span>
                    <input type="email" id="p-email">
                </label>
                <div class="form-row">
                    <label class="form-field">
                        <span class="form-field__label">Datum rođenja</span>
                        <input type="date" id="p-dob">
                    </label>
                    <label class="form-field">
                        <span class="form-field__label">Pol</span>
                        <select id="p-gender">
                            <option value="Muski">Muški</option>
                            <option value="Zenski">Ženski</option>
                            <option value="Drugo">Drugo</option>
                        </select>
                    </label>
                </div>
                <label class="form-field">
                    <span class="form-field__label">Nova lozinka (opciono)</span>
                    <input type="password" id="p-password" placeholder="Ostavi prazno da ne menjaš" autocomplete="new-password">
                </label>
                <button type="submit" class="btn btn--blue" id="profile-save">Sačuvaj izmene</button>
            </form>
        </div>

        <section class="my-reviews is-hidden" id="my-reviews">
            <h2 class="my-reviews__title">Moje recenzije <span class="page-sub" id="myrev-count"></span></h2>
            <div id="myrev-alert" class="page-alert is-hidden"></div>
            <div id="myrev-list"></div>
        </section>
    </main>

    <div class="modal-backdrop is-hidden" id="rev-modal">
        <div class="modal">
            <div class="modal__head">
                <h2 class="modal__title">Izmeni recenziju</h2>
                <button type="button" class="modal__close" data-close="rev-modal">×</button>
            </div>
            <form id="rev-form" novalidate>
                <div class="page-alert is-hidden" id="rev-alert"></div>
                <div class="form-row">
                    <label class="form-field">
                        <span class="form-field__label">Ocena</span>
                        <select id="rev-rating">
                            <option value="5">5 — Odlično</option>
                            <option value="4">4 — Vrlo dobro</option>
                            <option value="3">3 — Dobro</option>
                            <option value="2">2 — Loše</option>
                            <option value="1">1 — Veoma loše</option>
                        </select>
                    </label>
                    <label class="form-field">
                        <span class="form-field__label">Naslov</span>
                        <input type="text" id="rev-title">
                    </label>
                </div>
                <label class="form-field">
                    <span class="form-field__label">Sadržaj</span>
                    <textarea id="rev-content"></textarea>
                </label>
                <div class="modal__foot">
                    <button type="button" class="btn btn--line" data-close="rev-modal">Otkaži</button>
                    <button type="submit" class="btn btn--blue" id="rev-save">Sačuvaj</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container site-footer__bottom">© 2026 RezervisiMe — sva prava zadržana.</div>
    </footer>

    <script src="js/lib/jquery-3.7.1.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/util.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/profile.js"></script>

</body>
</html>
